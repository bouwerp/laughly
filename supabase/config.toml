project_id = "laughly-project"

[api]
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320

[db.pooler]
enabled = false

[realtime]
enabled = true

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://*.expo.dev", "laughly://*"]
jwt_expiry = 3600
enable_signup = true

[auth.external.google]
enabled = true
client_id = "600264258555-32c43sb7it6j70gp26vushju38q746je.apps.googleusercontent.com"
secret = "env(GOOGLE_CLIENT_SECRET)"
redirect_uri = "http://localhost:54321/auth/v1/callback"
